<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events | STEYNDIGGS Student Accommodation</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Modern CSS Variables for easy updates */
        :root {
            --primary-red: #ff6b6b;
            --soft-red: #ffe3e3;
            --grey-light: #f9f9f9;
        }

        .events-container {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr; /* Desktop: Calendar slightly wider */
            gap: 20px;
            margin-top: 30px;
            align-items: start;
        }

        /* Calendar Styling */
        .calendar-wrapper {
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            width: 100%;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .calendar-header h3 {
            font-size: 1.2rem;
            margin: 0;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            text-align: center;
        }

        .day-name { 
            font-weight: 700; 
            color: var(--primary-red); 
            padding-bottom: 8px;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .day {
            padding: 12px 0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid #f0f0f0;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 45px;
        }

        .day:hover { background: var(--grey-light); }
        
        .day.has-event { 
            background: var(--soft-red); 
            border-color: var(--primary-red); 
            font-weight: bold; 
            color: #333;
        }

        .day.selected { 
            background: var(--primary-red); 
            color: white; 
            border-color: var(--primary-red);
        }

        /* Event Detail Display */
        .event-display {
            background: var(--grey-light);
            padding: 20px;
            border-radius: 12px;
            border: 2px dashed #ddd;
            min-height: 350px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: opacity 0.3s ease;
        }

        .flyer-img {
            width: 100%;
            max-width: 400px;
            height: auto;
            border-radius: 10px;
            margin-top: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        /* --- RESPONSIVE BREAKPOINTS --- */

        /* Tablets & Smaller Desktops */
        @media (max-width: 992px) {
            .events-container {
                grid-template-columns: 1fr; /* Stack vertically */
                gap: 30px;
            }
        }

        /* Small Phones (iPhone SE, etc.) */
        @media (max-width: 400px) {
            .day {
                padding: 8px 0;
                font-size: 0.8rem;
                min-height: 38px;
            }
            .calendar-header h3 {
                font-size: 1rem;
            }
            .section-title {
                font-size: 1.5rem;
            }
        }
        /* Hamburger Menu Styles */
.menu-toggle {
    display: none; /* Hidden on desktop */
    flex-direction: column;
    cursor: pointer;
    gap: 5px;
}

.menu-toggle span {
    width: 25px;
    height: 3px;
    background-color: #333;
    transition: 0.3s;
}

@media (max-width: 768px) {
    .menu-toggle {
        display: flex; /* Show on mobile */
        z-index: 1001;
    }

    .nav-links {
        position: fixed;
        left: -100%; /* Hide off-screen */
        top: 0;
        flex-direction: column;
        background: #fff;
        width: 100%;
        height: 100vh;
        justify-content: center;
        transition: 0.3s;
        z-index: 1000;
        box-shadow: 2px 0 5px rgba(0,0,0,0.1);
    }

    .nav-links.active {
        left: 0; /* Slide in */
    }

    .nav-links li {
        margin: 20px 0;
    }
    
    /* Animation for the hamburger "X" when active */
    .menu-toggle.active span:nth-child(1) {
        transform: rotate(45deg) translate(5px, 6px);
    }
    .menu-toggle.active span:nth-child(2) {
        opacity: 0;
    }
    .menu-toggle.active span:nth-child(3) {
        transform: rotate(-45deg) translate(5px, -6px);
    }
}
    </style>
</head>
<body>

    <header>
        <nav class="navbar container">
            <a href="index.html" class="logo-link">
                <img src="17.jpeg" alt="STEYNDIGGS Logo" class="site-logo">
            </a>
            <h2 class="logo">STEYNDIGGS</h2>
            
            <div class="menu-toggle" id="mobile-menu">
                <span></span>
                <span></span>
                <span></span>
            </div>
    
            <ul class="nav-links" id="nav-list">
                <li><a href="index.html">Home</a></li>
                <li><a href="events.html" class="active">Events</a></li>
                <li><a href="index.html#contact" class="btn-nav">Apply Now</a></li> 
            </ul>
        </nav>
    </header>

<section class="section container">
    <h2 class="section-title">Student Life & Events</h2>
    <p style="text-align: center; color: #666; margin-bottom: 10px;">Click on a highlighted date to see details.</p>

    <div class="events-container">
        <div class="calendar-wrapper">
            <div class="calendar-header">
                <button id="prevMonth" class="btn-secondary" style="padding: 5px 15px;"> < </button>
                <h3 id="monthDisplay">March 2026</h3>
                <button id="nextMonth" class="btn-secondary" style="padding: 5px 15px;"> > </button>
            </div>
            <div class="calendar-grid" id="calendarGrid">
                </div>
        </div>

        <div class="event-display" id="eventDetail">
            <i class="fas fa-calendar-alt fa-3x" style="color: #ccc; margin-bottom: 15px;"></i>
            <h3>Select a date to view event details</h3>
        </div>
    </div>
</section>

<footer>
    <div class="container footer-content">
        <p>&copy; 2025 STEYNDIGGS Student Accommodation</p>
    </div>
</footer>

<script>
    // 1. Updated Data
    const events = [
        { 
            date: '2026-03-21', 
            title: 'Welcome Social 2026', 
            desc: 'Join us for motivational speakers, good vibes, community, and a braai! Strictly for residents.', 
            image: 'steyn.png' // Changed to .jpg to match your uploaded file
        }
    ];

    // Initialize to March 2026 so the event shows immediately
    let currentDate = new Date(2026, 2, 1); 

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        const monthDisplay = document.getElementById('monthDisplay');
        grid.innerHTML = '';

        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();
        
        monthDisplay.innerText = new Intl.DateTimeFormat('en-US', { month: 'long', year: 'numeric' }).format(currentDate);

        // Day Headers
        ['S', 'M', 'T', 'W', 'T', 'F', 'S'].forEach(day => {
            const el = document.createElement('div');
            el.className = 'day-name';
            el.innerText = day;
            grid.appendChild(el);
        });

        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        for (let i = 0; i < firstDay; i++) {
            grid.appendChild(document.createElement('div'));
        }

        for (let i = 1; i <= daysInMonth; i++) {
            const dayEl = document.createElement('div');
            dayEl.className = 'day';
            dayEl.innerText = i;

            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
            const eventMatch = events.find(e => e.date === dateStr);

            if (eventMatch) {
                dayEl.classList.add('has-event');
            }

            dayEl.onclick = () => {
                // Remove selected class from others
                document.querySelectorAll('.day').forEach(d => d.classList.remove('selected'));
                dayEl.classList.add('selected');
                showEvent(dateStr, eventMatch);
            };
            grid.appendChild(dayEl);
        }
    }

    function showEvent(date, event) {
        const display = document.getElementById('eventDetail');
        display.style.opacity = '0'; // Quick fade effect
        
        setTimeout(() => {
            if (event) {
                display.innerHTML = `
                    <span style="color: #ff6b6b; font-weight: bold; font-size: 0.9rem;">${date}</span>
                    <h2 style="margin: 5px 0; font-size: 1.4rem;">${event.title}</h2>
                    <p style="font-size: 0.95rem; color: #555;">${event.desc}</p>
                    <img src="${event.image}" class="flyer-img" alt="Event Flyer">
                `;
            } else {
                display.innerHTML = `
                    <i class="fas fa-calendar-times fa-3x" style="color: #ccc; margin-bottom: 15px;"></i>
                    <h3>No events for ${date}</h3>
                `;
            }
            display.style.opacity = '1';
        }, 200);
    }

    document.getElementById('prevMonth').onclick = () => { currentDate.setMonth(currentDate.getMonth() - 1); renderCalendar(); };
    document.getElementById('nextMonth').onclick = () => { currentDate.setMonth(currentDate.getMonth() + 1); renderCalendar(); };

    renderCalendar();
    // Hamburger Menu Logic
const mobileMenu = document.getElementById('mobile-menu');
const navList = document.getElementById('nav-list');

mobileMenu.addEventListener('click', () => {
    mobileMenu.classList.toggle('active');
    navList.classList.toggle('active');
});

// Close menu when a link is clicked
document.querySelectorAll('.nav-links a').forEach(link => {
    link.addEventListener('click', () => {
        mobileMenu.classList.remove('active');
        navList.classList.remove('active');
    });
});
</script>

</body>
</html>
