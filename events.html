<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events | STEYNDIGGS Student Accommodation</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Modern CSS Variables for easy updates */
        :root {
            --primary-red: #ff6b6b;
            --soft-red: #ffe3e3;
            --grey-light: #f9f9f9;
        }

        .events-container {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr; /* Desktop: Calendar slightly wider */
            gap: 20px;
            margin-top: 30px;
            align-items: start;
        }

        /* Calendar Styling */
        .calendar-wrapper {
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            width: 100%;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .calendar-header h3 {
            font-size: 1.2rem;
            margin: 0;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            text-align: center;
        }

        .day-name { 
            font-weight: 700; 
            color: var(--primary-red); 
            padding-bottom: 8px;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .day {
            padding: 12px 0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid #f0f0f0;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 45px;
        }

        .day:hover { background: var(--grey-light); }
        
        .day.has-event { 
            background: var(--soft-red); 
            border-color: var(--primary-red); 
            font-weight: bold; 
            color: #333;
        }

        .day.selected { 
            background: var(--primary-red); 
            color: white; 
            border-color: var(--primary-red);
        }

        /* Event Detail Display */
        .event-display {
            background: var(--grey-light);
            padding: 20px;
            border-radius: 12px;
            border: 2px dashed #ddd;
            min-height: 350px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: opacity 0.3s ease;
        }

        .flyer-img {
            width: 100%;
            max-width: 400px;
            height: auto;
            border-radius: 10px;
            margin-top: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        /* --- RESPONSIVE BREAKPOINTS --- */

        /* Tablets & Smaller Desktops */
        @media (max-width: 992px) {
            .events-container {
                grid-template-columns: 1fr; /* Stack vertically */
                gap: 30px;
            }
        }

        /* Small Phones (iPhone SE, etc.) */
        @media (max-width: 400px) {
            .day {
                padding: 8px 0;
                font-size: 0.8rem;
                min-height: 38px;
            }
            .calendar-header h3 {
                font-size: 1rem;
            }
            .section-title {
                font-size: 1.5rem;
            }
        }
        /* Hamburger Menu Styles */
.menu-toggle {
    display: none; /* Hidden on desktop */
    flex-direction: column;
    cursor: pointer;
    gap: 5px;
}

.menu-toggle span {
    width: 25px;
    height: 3px;
    background-color: #333;
    transition: 0.3s;
}

@media (max-width: 768px) {
    .menu-toggle {
        display: flex; /* Show on mobile */
        z-index: 1001;
    }

    .nav-links {
        position: fixed;
        left: -100%; /* Hide off-screen */
        top: 0;
        flex-direction: column;
        background: #fff;
        width: 100%;
        height: 100vh;
        justify-content: center;
        transition: 0.3s;
        z-index: 1000;
        box-shadow: 2px 0 5px rgba(0,0,0,0.1);
    }

    .nav-links.active {
        left: 0; /* Slide in */
    }

    .nav-links li {
        margin: 20px 0;
    }
    
    /* Animation for the hamburger "X" when active */
    .menu-toggle.active span:nth-child(1) {
        transform: rotate(45deg) translate(5px, 6px);
    }
    .menu-toggle.active span:nth-child(2) {
        opacity: 0;
    }
    .menu-toggle.active span:nth-child(3) {
        transform: rotate(-45deg) translate(5px, -6px);
    }
}

/* Modal Styles */
.modal {
    display: none; 
    position: fixed;
    z-index: 2000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.5);
    align-items: center;
    justify-content: center;
}

.modal-content {
    background-color: #fff;
    padding: 30px;
    border-radius: 15px;
    width: 90%;
    max-width: 400px;
    position: relative;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

.close-modal {
    position: absolute;
    right: 20px;
    top: 15px;
    font-size: 24px;
    cursor: pointer;
    color: #888;
}

.modal-content h3 { margin-bottom: 20px; color: var(--primary-red); }

.event-form { display: flex; flex-direction: column; gap: 15px; }

.event-form input, .event-form textarea {
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-family: 'Poppins', sans-serif;
}

.btn-submit {
    background: var(--primary-red);
    color: white;
    border: none;
    padding: 12px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
}

/* Add Event Button */
.add-event-trigger {
    background: #333;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 20px;
    cursor: pointer;
    margin-bottom: 20px;
    transition: 0.3s;
}
.add-event-trigger:hover { background: var(--primary-red); }

/* Ensure the nav-links container aligns everything in the center vertically */
.nav-links {
    display: flex;
    align-items: center; /* Vertically centers Home, Events, and the Button */
    list-style: none;
    gap: 20px;
}

/* Specific styling for the list item holding the button */
.nav-btn-item {
    display: flex;
    align-items: center;
}

/* Adjust the button itself to remove any default margins that might throw off alignment */
.add-event-trigger {
    margin-bottom: 0 !important; /* Overriding your previous 20px margin */
    padding: 8px 18px;
    font-size: 0.9rem;
    white-space: nowrap; /* Prevents the text from wrapping */
}

/* Mobile Alignment Fix */
@media (max-width: 768px) {
    .nav-links {
        padding: 20px;
    }
    
    .nav-btn-item {
        width: 100%;
        justify-content: center;
        margin-top: 10px;
    }
}
/* Container for the loading spinner */
.loading-container {
    grid-column: 1 / -1; /* Spans across all calendar columns */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    color: #666;
}

/* The Spinner */
.loader-icon {
    width: 40px;
    height: 40px;
    border: 4px solid #f3f3f3;
    border-top: 4px solid #3498db; /* Change to your brand color */
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-bottom: 10px;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
    </style>
</head>
<body>

    <header>
        <nav class="navbar container">
            <a href="index.html" class="logo-link">
                <img src="17.jpeg" alt="STEYNDIGGS Logo" class="site-logo">
            </a>
            <h2 class="logo">STEYNDIGGS</h2>
            
            <div class="menu-toggle" id="mobile-menu">
                <span></span>
                <span></span>
                <span></span>
            </div>
    
            <ul class="nav-links" id="nav-list">
                <li><a href="index.html">Home</a></li>
                <li class="nav-btn-item">
                    <button class="add-event-trigger" id="openModalBtn">
                        <i class="fas fa-plus"></i> Add New Event
                    </button>
                </li>
            </ul>
        </nav>
    </header>

<section class="section container">
    <h2 class="section-title">Student Life & Events</h2>
    <p style="text-align: center; color: #666; margin-bottom: 10px;">Click on a highlighted date to see details.</p>

    <div class="events-container">
        <div class="calendar-wrapper">
            <div class="calendar-header">
                <button id="prevMonth" class="btn-secondary" style="padding: 5px 15px;"> < </button>
                <h3 id="monthDisplay">March 2026</h3>
                <button id="nextMonth" class="btn-secondary" style="padding: 5px 15px;"> > </button>
            </div>
            <div class="calendar-grid" id="calendarGrid">
                </div>
        </div>

        <div class="event-display" id="eventDetail">
            <i class="fas fa-calendar-alt fa-3x" style="color: #ccc; margin-bottom: 15px;"></i>
            <h3>Select a date to view event details</h3>
        </div>
    </div>
</section>

<footer>
    <div class="container footer-content">
        <p>&copy; 2025 STEYNDIGGS Student Accommodation</p>
    </div>
</footer>
<div id="eventModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" id="closeModalBtn">&times;</span>
        <h3>Add New Event</h3>
        <form class="event-form" id="eventForm">
            <input type="date" id="eventDate" required>
            <input type="text" id="eventTitle" placeholder="Event Title" required>
            <textarea id="eventDesc" placeholder="Description" rows="3" required></textarea>
            <label for="eventImage" style="font-size: 0.8rem; color: #666;">Upload Event Flyer:</label>
            <input type="file" id="eventImage" accept="image/*">            <button type="submit" class="btn-submit">Save Event</button>
        </form>
    </div>
</div>
<script src="events.js"></script>

</body>
</html>
